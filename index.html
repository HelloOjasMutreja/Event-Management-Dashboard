<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Club Event Management Dashboard - Create, manage, and showcase your club events" />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <!-- No og:description → forces platforms to render the large image card -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clubevents-dashboard.vercel.app/" />
    <meta property="og:title" content="ClubEvents — Event Management Dashboard" />
    <meta property="og:image" content="https://clubevents-dashboard.vercel.app/og-image.png?v=2" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ClubEvents — Event Management Dashboard" />
    <meta property="og:site_name" content="ClubEvents" />

    <!-- Twitter / X — large image card, no description text -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@clubevents" />
    <meta name="twitter:title" content="ClubEvents — Event Management Dashboard" />
    <meta name="twitter:image" content="https://clubevents-dashboard.vercel.app/og-image.png?v=2" />
    <meta name="twitter:image:alt" content="ClubEvents — Event Management Dashboard" />

    <!-- Theme -->
    <meta name="theme-color" content="#F2EDE8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <title>ClubEvents — Event Management Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
